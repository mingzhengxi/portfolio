<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지? 🍱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede9;
      --text: #1a1a1a;
      --text2: #666;
      --text3: #aaa;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg2: #2c2c2e;
        --bg3: #3a3a3c;
        --text: #f0f0f0;
        --text2: #aaa;
        --text3: #666;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg3);
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    header { margin-bottom: 1.5rem; }
    header h1 { font-size: 26px; font-weight: 700; color: var(--text); }
    header p  { font-size: 14px; color: var(--text2); margin-top: 4px; }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .tab {
      flex: 1; padding: 8px 0; border: 0.5px solid var(--border2);
      border-radius: var(--radius-md); font-size: 14px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--text2);
      font-family: inherit; transition: all 0.15s;
    }
    .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .section { display: none; }
    .section.active { display: block; }

    /* ── Quick chips ── */
    .chip-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
    .chip {
      padding: 5px 11px; border: 0.5px solid var(--border); border-radius: 20px;
      font-size: 13px; cursor: pointer; background: transparent; color: var(--text2);
      font-family: inherit; transition: all 0.15s;
    }
    .chip:hover { background: var(--bg2); color: var(--text); border-color: var(--border2); }

    /* ── Menu list ── */
    .menu-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1rem; min-height: 0; }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--bg2);
      border-radius: var(--radius-md); border: 0.5px solid var(--border);
    }
    .menu-item .emoji { font-size: 17px; width: 26px; text-align: center; }
    .menu-item .name { flex: 1; font-size: 14px; color: var(--text); }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 15px; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s; line-height: 1;
    }
    .del-btn:hover { color: #E24B4A; }

    .empty { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 14px; }

    /* ── Add row ── */
    .add-row { display: flex; gap: 8px; }
    .add-row input {
      flex: 1; padding: 9px 12px; border: 0.5px solid var(--border2);
      border-radius: var(--radius-md); font-size: 14px;
      background: var(--bg); color: var(--text);
      outline: none; font-family: inherit;
    }
    .add-row input:focus { border-color: var(--text2); }
    .add-row button {
      padding: 9px 18px; background: var(--text); color: var(--bg);
      border: none; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    .add-row button:hover { opacity: 0.85; }

    /* ── Ladder ── */
    .ladder-wrap {
      background: var(--bg2); border-radius: var(--radius-md);
      border: 0.5px solid var(--border); overflow: hidden; margin-bottom: 1rem;
    }
    #ladder-canvas { display: block; width: 100%; }

    /* ── Result ── */
    #result-box {
      display: none; text-align: center; padding: 1.5rem 1rem;
      background: var(--bg2); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border); margin-bottom: 1rem;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    #result-box .r-emoji { font-size: 40px; margin-bottom: 6px; }
    #result-box .r-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
    #result-box .r-name  { font-size: 28px; font-weight: 700; color: var(--text); }

    /* ── Spin button ── */
    #spin-btn {
      width: 100%; padding: 14px;
      background: var(--text); color: var(--bg);
      border: none; border-radius: var(--radius-lg);
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }
    #spin-btn:hover:not(:disabled) { opacity: 0.82; }
    #spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    @keyframes popIn {
      from { transform: scale(0.72); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>오늘 뭐 먹지? 🍱</h1>
    <p>메뉴를 등록하고 사다리로 결정하세요</p>
  </header>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('menu')">메뉴 관리</button>
      <button class="tab" onclick="showTab('ladder')">사다리타기</button>
    </div>

    <!-- ── 메뉴 관리 ── -->
    <div id="tab-menu" class="section active">
      <p class="chip-label">빠른 추가</p>
      <div class="chips">
        <button class="chip" onclick="quickAdd('김치찌개','🍲')">🍲 김치찌개</button>
        <button class="chip" onclick="quickAdd('삼겹살','🥩')">🥩 삼겹살</button>
        <button class="chip" onclick="quickAdd('짜장면','🍜')">🍜 짜장면</button>
        <button class="chip" onclick="quickAdd('초밥','🍣')">🍣 초밥</button>
        <button class="chip" onclick="quickAdd('비빔밥','🥗')">🥗 비빔밥</button>
        <button class="chip" onclick="quickAdd('라멘','🍥')">🍥 라멘</button>
        <button class="chip" onclick="quickAdd('치킨','🍗')">🍗 치킨</button>
        <button class="chip" onclick="quickAdd('피자','🍕')">🍕 피자</button>
        <button class="chip" onclick="quickAdd('버거','🍔')">🍔 버거</button>
        <button class="chip" onclick="quickAdd('된장찌개','🫕')">🫕 된장찌개</button>
        <button class="chip" onclick="quickAdd('파스타','🍝')">🍝 파스타</button>
        <button class="chip" onclick="quickAdd('쌀국수','🍜')">🍜 쌀국수</button>
      </div>

      <div id="menu-list" class="menu-list"></div>

      <div class="add-row">
        <input id="menu-input" type="text" placeholder="직접 입력 (예: 순대국밥)" maxlength="20"
               onkeydown="if(event.key==='Enter') addMenu()" />
        <button onclick="addMenu()">추가</button>
      </div>
    </div>

    <!-- ── 사다리타기 ── -->
    <div id="tab-ladder" class="section">
      <div class="ladder-wrap">
        <canvas id="ladder-canvas"></canvas>
      </div>
      <div id="result-box">
        <div class="r-emoji" id="result-emoji">🍱</div>
        <div class="r-label">오늘의 점심은</div>
        <div class="r-name"  id="result-name">—</div>
      </div>
      <button id="spin-btn" onclick="startLadder()">사다리 타기 !</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────
let menus = [
  { name: '김치찌개', emoji: '🍲' },
  { name: '비빔밥',   emoji: '🥗' },
  { name: '초밥',     emoji: '🍣' },
];

let isRunning  = false;
let ladderData = null;
let winnerCol  = -1;

const COLORS = ['#378ADD','#D85A30','#1D9E75','#BA7517','#D4537E','#7F77DD','#639922','#E24B4A'];
const FALLBACK_EMOJIS = ['🍱','🍜','🥘','🥗','🍛','🍝','🥙','🌮','🥪','🍲'];

// ── Tab switching ──────────────────────────────────────────────────
function showTab(t) {
  document.querySelectorAll('.tab').forEach((b, i) =>
    b.classList.toggle('active', ['menu','ladder'][i] === t));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'ladder') drawLadderStatic();
}

// ── Menu management ────────────────────────────────────────────────
function renderMenuList() {
  const el = document.getElementById('menu-list');
  if (!menus.length) {
    el.innerHTML = '<div class="empty">아직 메뉴가 없어요.<br>위에서 추가해보세요!</div>';
    return;
  }
  el.innerHTML = menus.map((m, i) => `
    <div class="menu-item">
      <span class="emoji">${m.emoji}</span>
      <span class="name">${m.name}</span>
      <button class="del-btn" onclick="removeMenu(${i})">✕</button>
    </div>`).join('');
}

function addMenu() {
  const inp = document.getElementById('menu-input');
  const v   = inp.value.trim();
  if (!v) return;
  menus.push({ name: v, emoji: FALLBACK_EMOJIS[menus.length % FALLBACK_EMOJIS.length] });
  inp.value = '';
  renderMenuList();
}

function quickAdd(name, emoji) {
  if (menus.find(m => m.name === name)) return;
  menus.push({ name, emoji });
  renderMenuList();
}

function removeMenu(i) {
  menus.splice(i, 1);
  renderMenuList();
}

// ── Ladder logic ───────────────────────────────────────────────────
function buildLadder(n) {
  const rows  = Math.max(6, n * 3);
  const rungs = [];
  for (let r = 0; r < rows; r++) {
    const used = new Set();
    for (let c = 0; c < n - 1; c++) {
      if (!used.has(c) && !used.has(c + 1) && Math.random() < 0.42) {
        rungs.push({ row: r, col: c });
        used.add(c); used.add(c + 1);
      }
    }
  }
  return { rows, rungs };
}

function traceColumn(col, data) {
  let c = col;
  const path = [{ c, row: -1 }];
  for (let r = 0; r < data.rows; r++) {
    const right = data.rungs.find(rg => rg.row === r && rg.col === c);
    const left  = data.rungs.find(rg => rg.row === r && rg.col === c - 1);
    if (right)     { path.push({ c: c + 0.5, row: r }); c++; path.push({ c, row: r }); }
    else if (left) { path.push({ c: c - 0.5, row: r }); c--; path.push({ c, row: r }); }
    else           { path.push({ c, row: r }); }
  }
  path.push({ c, row: data.rows });
  return { path, result: c };
}

// ── Canvas rendering ───────────────────────────────────────────────
function renderCanvas(data, n, animStep, highlightCol) {
  const canvas = document.getElementById('ladder-canvas');
  const W      = canvas.clientWidth || 400;
  const PAD    = 28;
  const colW   = (W - PAD * 2) / (n - 1);
  const ROW_H  = 22;
  const TOP    = 52;
  const BOT    = 44;
  const H      = data.rows * ROW_H + TOP + BOT;

  canvas.width  = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const isDark    = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const lineColor = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
  const textColor = isDark ? '#e0e0e0' : '#333';
  const mutedText = isDark ? '#777' : '#aaa';

  const xOf = c => PAD + c * colW;
  const yOf = r => TOP + r * ROW_H + ROW_H / 2;

  // Vertical rails
  for (let c = 0; c < n; c++) {
    ctx.strokeStyle = lineColor;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(xOf(c), TOP);
    ctx.lineTo(xOf(c), TOP + data.rows * ROW_H);
    ctx.stroke();
  }

  // Rungs
  for (const rg of data.rungs) {
    ctx.strokeStyle = lineColor;
    ctx.lineWidth   = 1.5;
    const y = yOf(rg.row);
    ctx.beginPath();
    ctx.moveTo(xOf(rg.col), y);
    ctx.lineTo(xOf(rg.col + 1), y);
    ctx.stroke();
  }

  // Top labels
  ctx.textAlign  = 'center';
  ctx.textBaseline = 'middle';
  for (let c = 0; c < n; c++) {
    const isHi = c === highlightCol;
    ctx.fillStyle = isHi ? COLORS[c % COLORS.length] : mutedText;
    ctx.font = `${isHi ? 600 : 400} 12px 'Noto Sans KR', sans-serif`;
    ctx.fillText('출발', xOf(c), TOP - 18);

    // small dot
    ctx.fillStyle = isHi ? COLORS[c % COLORS.length] : lineColor;
    ctx.beginPath();
    ctx.arc(xOf(c), TOP - 6, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Animated highlight path
  if (highlightCol !== null && highlightCol >= 0) {
    const trace      = traceColumn(highlightCol, data);
    const color      = COLORS[highlightCol % COLORS.length];
    const totalSteps = trace.path.length - 1;
    const drawUpTo   = animStep === -1 ? totalSteps : Math.min(animStep, totalSteps);

    ctx.strokeStyle = color;
    ctx.lineWidth   = 3.5;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    for (let i = 0; i <= drawUpTo; i++) {
      const pt = trace.path[i];
      const px = xOf(pt.c);
      const py = pt.row === -1
        ? TOP
        : pt.row === data.rows
          ? TOP + data.rows * ROW_H
          : yOf(pt.row);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Moving dot at tip
    if (animStep >= 0 && animStep < totalSteps) {
      const tip  = trace.path[drawUpTo];
      const tipX = xOf(tip.c);
      const tipY = tip.row === -1
        ? TOP
        : tip.row === data.rows
          ? TOP + data.rows * ROW_H
          : yOf(tip.row);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(tipX, tipY, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Bottom labels
  const finalCols = menus.map((_, c) => traceColumn(c, data).result);
  for (let dest = 0; dest < n; dest++) {
    const srcCol  = finalCols.indexOf(dest);
    const isWin   = (animStep === -1 && dest === winnerCol);
    const color   = COLORS[srcCol % COLORS.length];
    const x       = xOf(dest);
    const y       = TOP + data.rows * ROW_H + 26;

    // dot at rail end
    ctx.fillStyle = isWin ? color : lineColor;
    ctx.beginPath();
    ctx.arc(xOf(dest), TOP + data.rows * ROW_H + 6, 3, 0, Math.PI * 2);
    ctx.fill();

    if (isWin) {
      ctx.fillStyle = color + '28';
      ctx.beginPath();
      ctx.arc(x, y, 16, 0, Math.PI * 2);
      ctx.fill();
    }

    const label = (menus[dest]?.name || '').slice(0, 5);
    ctx.fillStyle = isWin ? color : mutedText;
    ctx.font = `${isWin ? 700 : 400} 12px 'Noto Sans KR', sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  }
}

function drawLadderStatic() {
  const n = menus.length;
  const canvas = document.getElementById('ladder-canvas');

  if (n < 2) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.clientWidth || 400;
    canvas.height = 180;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle   = '#aaa';
    ctx.font        = '14px sans-serif';
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('메뉴를 2개 이상 추가해주세요', canvas.width / 2, 90);
    return;
  }

  ladderData = buildLadder(n);
  winnerCol  = -1;
  document.getElementById('result-box').style.display = 'none';
  renderCanvas(ladderData, n, -2, null);
}

// ── Animation ──────────────────────────────────────────────────────
function startLadder() {
  if (isRunning) return;
  const n = menus.length;
  if (n < 2) { showTab('menu'); return; }

  isRunning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-box').style.display = 'none';

  ladderData = buildLadder(n);
  const startCol  = Math.floor(Math.random() * n);
  const trace     = traceColumn(startCol, ladderData);
  winnerCol       = trace.result;

  const totalSteps = trace.path.length - 1;
  const speed      = Math.max(28, Math.floor(1800 / totalSteps));
  let   step       = 0;

  function tick() {
    renderCanvas(ladderData, n, step, startCol);
    if (step < totalSteps) {
      step++;
      setTimeout(tick, speed);
    } else {
      isRunning = false;
      document.getElementById('spin-btn').disabled = false;
      showResult(winnerCol);
    }
  }
  tick();
}

function showResult(col) {
  const m   = menus[col];
  const box = document.getElementById('result-box');
  document.getElementById('result-emoji').textContent = m.emoji;
  document.getElementById('result-name').textContent  = m.name;
  box.style.display   = 'block';
  box.style.animation = 'none';
  box.offsetHeight;                         // reflow to restart animation
  box.style.animation = 'popIn 0.35s cubic-bezier(0.34,1.56,0.64,1)';
  renderCanvas(ladderData, menus.length, -1, null);
}

// ── Init ───────────────────────────────────────────────────────────
renderMenuList();
</script>
</body>
</html>
